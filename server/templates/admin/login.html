<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فرصة — تسجيل دخول الأدمن</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #7C3AED 0%, #A855F7 50%, #EC4899 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #7C3AED, #EC4899);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      font-size: 28px;
    }
    .logo h1 { font-size: 28px; font-weight: 800; color: #1a1a2e; }
    .logo p { font-size: 13px; color: #6b7280; margin-top: 4px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .input-group { margin-bottom: 18px; position: relative; }
    input {
      width: 100%; padding: 14px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px; color: #1f2937;
      outline: none; transition: border-color 0.2s;
      font-family: inherit;
      text-align: right;
    }
    input:focus { border-color: #7C3AED; }
    .eye-btn {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #9ca3af; font-size: 18px; padding: 4px;
    }
    .btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #7C3AED, #EC4899);
      color: #fff; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #fef2f2; color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 10px; padding: 12px 16px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💎</div>
      <h1>فرصة</h1>
      <p>لوحة تحكم الأدمن</p>
    </div>
    <div class="error" id="error"></div>
    <div class="input-group">
      <label>اسم المستخدم أو البريد الإلكتروني</label>
      <input type="text" id="email" placeholder="admin" autocomplete="username" />
    </div>
    <div class="input-group">
      <label>كلمة السر</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      <button class="eye-btn" onclick="togglePwd()" type="button" id="eyeBtn">👁</button>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
  </div>

  <script>
    function togglePwd() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error');
      const btn = document.getElementById('loginBtn');

      errEl.style.display = 'none';
      if (!email || !password) {
        errEl.textContent = 'يرجى ملء جميع الحقول';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username: email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'خطأ في تسجيل الدخول');
        if (data.role !== 'admin') throw new Error('ليس لديك صلاحية الوصول للوحة التحكم');
        window.location.href = '/admin';
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'تسجيل الدخول';
      }
    }

    // Auto-redirect if already logged in as admin
    fetch('/api/auth/me', { credentials: 'include' })
      .then(r => r.json())
      .then(u => { if (u && u.role === 'admin') window.location.href = '/admin'; })
      .catch(() => {});
  </script>
</body>
</html>
